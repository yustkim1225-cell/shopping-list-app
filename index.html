<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4f8ef7, #7b5ef7);
      padding: 28px 28px 24px;
      color: #fff;
    }

    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header .stats { font-size: 0.85rem; margin-top: 6px; opacity: 0.85; }

    .db-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 6px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 12px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f8ef7; }
    .input-area input:disabled { background: #f8fafc; }

    .input-area button {
      padding: 12px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-area button:hover:not(:disabled) { background: #3a7ae0; }
    .input-area button:active:not(:disabled) { transform: scale(0.95); }
    .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 0 20px 14px;
    }

    .filter-bar button {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 0 20px;
      max-height: 420px;
      overflow-y: auto;
    }

    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #f8fafc; }

    .item input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.97rem;
      color: #1e293b;
      transition: color 0.2s;
      word-break: break-all;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 8px; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 20px;
      border-top: 1px solid #f1f5f9;
      margin-top: 8px;
    }

    .footer span { font-size: 0.82rem; color: #94a3b8; }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ef4444;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover:not(:disabled) { background: #fef2f2; }
    .clear-btn:disabled { color: #cbd5e1; cursor: default; }

    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      font-size: 0.95rem; color: #64748b; gap: 12px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 0.85rem; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span>Supabase 연결 중...</span>
</div>

<div class="card">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">항목 0개 · 완료 0개</div>
    <div class="db-badge">☁️ Supabase DB 연동</div>
  </div>

  <div class="input-area">
    <input id="itemInput" type="text" placeholder="구매할 항목을 입력하세요..." maxlength="60" disabled />
    <button id="addBtn" disabled>＋</button>
  </div>

  <div class="filter-bar">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="todo">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span id="footerInfo"></span>
    <button class="clear-btn" id="clearDone" disabled>완료 항목 삭제</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  // ── Supabase 설정 ──────────────────────────────────
  const SUPABASE_URL  = 'https://sayjexiodicrqskfycww.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNheWpleGlvZGljcnFza2Z5Y3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTMyNjksImV4cCI6MjA4OTk4OTI2OX0.aKYFPuaM7s1qLhKdGjI-OSjALqavdzaXKfOEo5umIuI';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
  // ──────────────────────────────────────────────────

  let items  = [];
  let filter = 'all';

  const inputEl      = document.getElementById('itemInput');
  const addBtn       = document.getElementById('addBtn');
  const listEl       = document.getElementById('list');
  const statsEl      = document.getElementById('stats');
  const footerInfo   = document.getElementById('footerInfo');
  const clearDoneBtn = document.getElementById('clearDone');
  const overlay      = document.getElementById('loadingOverlay');
  const toastEl      = document.getElementById('toast');

  function showToast(msg, isError = false) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toastEl.className = 'toast', 2500);
  }

  function getFiltered() {
    if (filter === 'todo') return items.filter(i => !i.done);
    if (filter === 'done') return items.filter(i =>  i.done);
    return items;
  }

  function render() {
    const filtered  = getFiltered();
    const doneCount = items.filter(i => i.done).length;

    statsEl.textContent    = `항목 ${items.length}개 · 완료 ${doneCount}개`;
    footerInfo.textContent = `${filtered.length}개 표시 중`;
    clearDoneBtn.disabled  = doneCount === 0;

    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <li class="empty">
          <div class="icon">${filter === 'done' ? '✅' : '🛍️'}</div>
          <div>${filter === 'done' ? '완료된 항목이 없습니다' : filter === 'todo' ? '미완료 항목이 없습니다' : '항목을 추가해보세요!'}</div>
        </li>`;
      return;
    }

    filtered.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' done' : '');
      li.innerHTML = `
        <input type="checkbox" ${item.done ? 'checked' : ''} aria-label="완료 체크" />
        <span class="item-text">${escapeHtml(item.text)}</span>
        <button class="del-btn" title="삭제">🗑</button>
      `;
      li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggle(item));
      li.querySelector('.del-btn').addEventListener('click', () => remove(item.id));
      listEl.appendChild(li);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadItems() {
    const { data, error } = await supabase
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { showToast('데이터 로드 실패: ' + error.message, true); return; }
    items = data;
    render();
  }

  async function add() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }

    inputEl.disabled = true;
    addBtn.disabled  = true;

    const { data, error } = await supabase
      .from('shopping_items')
      .insert([{ text, done: false }])
      .select()
      .single();

    inputEl.disabled = false;
    addBtn.disabled  = false;
    inputEl.value    = '';
    inputEl.focus();

    if (error) { showToast('추가 실패: ' + error.message, true); return; }
    items.unshift(data);
    render();
    showToast('추가되었습니다 ✅');
  }

  async function toggle(item) {
    const { error } = await supabase
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', item.id);

    if (error) { showToast('업데이트 실패', true); render(); return; }
    item.done = !item.done;
    render();
  }

  async function remove(id) {
    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) { showToast('삭제 실패', true); return; }
    items = items.filter(i => i.id !== id);
    render();
    showToast('삭제되었습니다');
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (!doneIds.length) return;

    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .in('id', doneIds);

    if (error) { showToast('일괄 삭제 실패', true); return; }
    items = items.filter(i => !i.done);
    render();
    showToast(`완료 항목 ${doneIds.length}개 삭제됨`);
  }

  // 실시간 구독 - 다른 탭/기기 변경사항 즉시 반영
  supabase
    .channel('shopping_items_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items' }, () => {
      loadItems();
    })
    .subscribe();

  addBtn.addEventListener('click', add);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  clearDoneBtn.addEventListener('click', clearDone);

  document.querySelector('.filter-bar').addEventListener('click', e => {
    if (!e.target.dataset.filter) return;
    filter = e.target.dataset.filter;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render();
  });

  (async () => {
    await loadItems();
    overlay.style.display = 'none';
    inputEl.disabled = false;
    addBtn.disabled  = false;
  })();
</script>
</body>
</html>
